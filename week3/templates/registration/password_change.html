<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
    <link href="https://cdn.staticfile.org/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow">
                <div class="card-header bg-dark text-white text-center py-3">
                    <h4 class="mb-0">Security Settings</h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted small mb-4">Please enter your old password and then the new one twice to confirm.</p>
                    <form method="post">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label small fw-bold">{{ field.label }}</label>
                            {{ field }}
                            {% for error in field.errors %}
                            <p class="text-danger mb-0" style="font-size: 0.75rem;">{{ error }}</p>
                            {% endfor %}
                        </div>
                        {% endfor %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Update Password</button>
                            <a href="{% url 'game_list' %}" class="btn btn-light border">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    document.querySelectorAll('input').forEach(i => i.classList.add('form-control'));
</script>
</body>
</html>
