<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GameCenter</title>
    <link href="https://cdn.staticfile.org/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.2);
        }
        .btn-login {
            padding: 0.8rem;
            letter-spacing: 0.05rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row">
        <div class="col-sm-9 col-md-7 col-lg-5 mx-auto">
            <div class="card p-4">
                <div class="card-body">
                    <h3 class="card-title text-center mb-4 fw-light">Welcome Back</h3>
                    <form method="post">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-3 text-start">
                            <label for="{{ field.id_for_label }}" class="form-label small fw-bold text-muted">{{ field.label }}</label>
                            {{ field }}
                            {% for error in field.errors %}
                                <div class="text-danger small">{{ error }}</div>
                            {% endfor %}
                        </div>
                        {% endfor %}
                        <div class="d-grid mt-4">
                            <button class="btn btn-primary btn-login text-uppercase fw-bold shadow-sm" type="submit">Sign In</button>
                        </div>
                        <hr class="my-4">
                        <div class="text-center">
                            <a class="small text-decoration-none" href="{% url 'register' %}">Need an account? Register!</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 自动修复 Django 生成的 input 样式并解决错乱
    document.querySelectorAll('input').forEach(input => {
        input.classList.add('form-control', 'form-control-lg');
        // 确保密码框隐藏字符
        if (input.name.toLowerCase().includes('password')) {
            input.type = 'password';
        }
    });
</script>
</body>
</html>
